<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>
    PWEB1 — Cap. 05 — AT01 — Formulário de Contato
  </title>
</head>

<body>

  <header>

    <h1>Formulário de Contato</h1>

    <p>
      <a href="../index.html">
        ← Voltar para a página principal
      </a>
    </p>

  </header>

  <main>

    <!-- Formulário -->
    <form
      action="https://httpbin.org/get"
      method="get">

      <!-- Nome -->
      <p>
        <label for="nome">
          Nome completo:
        </label>

        <input
          type="text"
          id="nome"
          name="nome">
      </p>

      <!-- Email -->
      <p>
        <label for="email">
          E-mail:
        </label>

        <input
          type="email"
          id="email"
          name="email">
      </p>

      <!-- Assunto -->
      <p>
        <label for="assunto">
          Assunto:
        </label>

        <input
          type="text"
          id="assunto"
          name="assunto">
      </p>

      <!-- Mensagem -->
      <p>
        <label for="mensagem">
          Mensagem:
        </label>

        <textarea
          id="mensagem"
          name="mensagem"
          rows="5"></textarea>
      </p>

      <!-- Botão -->
      <button type="submit">
        Enviar mensagem
      </button>

    </form>

  </main>

</body>

</html>
